repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-case-conflict
  - repo: https://github.com/asottile/pyupgrade
    rev: v3.20.0
    hooks:
      - id: pyupgrade
        args: [--py310-plus]
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.10
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
  - repo: https://github.com/executablebooks/mdformat
    rev: 0.7.22
    hooks:
      - id: mdformat
        additional_dependencies:
          - mdformat-gfm
  - repo: local
    hooks:
      - id: check-empty-files
        name: Check for empty files
        entry: 'python -c "import sys, os; empty=[f for f in sys.argv[1:] if os.path.getsize(f) == 0 and not f.endswith(''__init__.py'')]; [print(f''Empty file blocked: {f}'') for f in empty]; sys.exit(1 if empty else 0)"'
        language: python
        types: [file]
